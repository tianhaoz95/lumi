<body class="font-body text-on-surface bg-surface min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Background Texture & Decorative Elements -->
<div class="absolute inset-0 frost-gradient opacity-100 z-0"></div>
<div class="absolute inset-0 bg-grain opacity-[0.03] z-10 pointer-events-none"></div>
<!-- Atmospheric "Mist" Orbs -->
<div class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[400px] h-[400px] bg-secondary/5 rounded-full blur-[100px] pointer-events-none"></div>
<main class="w-full max-w-md z-20">
<!-- Logo Header -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-white/40 backdrop-blur-md rounded-xl flex items-center justify-center mb-4 shadow-[0_8px_32px_rgba(0,70,74,0.04)]">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="ac_unit">ac_unit</span>
</div>
<h1 class="font-headline font-extrabold text-4xl tracking-tight text-primary">Lumi</h1>
<p class="font-label text-sm text-outline mt-2 tracking-wide uppercase">The Glacial Sanctuary</p>
</div>
<!-- Login Card (Glassmorphism) -->
<div class="bg-surface-container-lowest/70 backdrop-blur-2xl p-8 rounded-lg shadow-[0_20px_50px_rgba(23,28,30,0.05)] border border-white/40">
<div class="mb-8">
<h2 class="font-headline text-2xl font-bold text-on-surface">Welcome back</h2>
<p class="text-on-surface-variant text-sm mt-1">Enter your sanctuary credentials.</p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div>
<label class="block font-label text-[11px] font-semibold uppercase tracking-widest text-outline mb-2 ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="alternate_email">alternate_email</span>
</div>
<input class="w-full bg-surface-container-high/50 border-none rounded-DEFAULT py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/40 focus:bg-white transition-all duration-300" id="email" placeholder="name@lumi.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-2 px-1">
<label class="block font-label text-[11px] font-semibold uppercase tracking-widest text-outline" for="password">Password</label>
<a class="text-[11px] font-semibold text-primary hover:text-primary-container transition-colors uppercase tracking-wider" href="#">Forgot?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<input class="w-full bg-surface-container-high/50 border-none rounded-DEFAULT py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/40 focus:bg-white transition-all duration-300" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-white py-4 rounded-full font-headline font-bold text-lg flex items-center justify-center gap-2 shadow-[0_12px_24px_rgba(0,70,74,0.15)] hover:scale-[1.02] active:scale-[0.98] transition-all duration-300" type="submit">
                    Login
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-8 pt-6 border-t border-outline-variant/15 flex flex-col items-center">
<p class="text-on-surface-variant text-sm mb-4">New to the sanctuary?</p>
<button class="w-full bg-surface-container-lowest/40 backdrop-blur-md border border-outline-variant/20 py-3 rounded-full font-label font-semibold text-on-surface hover:bg-white/60 transition-all duration-300">
                    Create account
                </button>
</div>
</div>
<!-- Empty State / Footer Presence -->
<div class="mt-12 flex items-center justify-center opacity-20 group cursor-default">
<span class="material-symbols-outlined text-6xl text-primary" data-icon="nature">nature</span>
</div>
</main>
<!-- Invisible Image Prompt Anchors for System Context -->
<div class="hidden">

</div>
