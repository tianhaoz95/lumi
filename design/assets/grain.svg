<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none">
  <!-- Grain using feTurbulence. Opacity is kept very low (approx 2.5%).
       Some flutter_svg runtimes may not fully support all filter primitives; a test-time fallback exists in the Dart widget. -->
  <defs>
    <filter id="grainFilter" x="-10%" y="-10%" width="120%" height="120%">
      <!-- fractalNoise provides natural-looking grain -->
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="noise" />
      <!-- reduce to luminance-only -->
      <feColorMatrix in="noise" type="saturate" values="0" result="mono" />
      <!-- map intensity to alpha to get translucent grain -->
      <feComponentTransfer in="mono" result="alpha">
        <feFuncA type="table" tableValues="0 0.025" />
      </feComponentTransfer>
      <!-- composite the noise over transparent background -->
      <feComposite in="alpha" in2="SourceGraphic" operator="over" />
    </filter>
  </defs>

  <!-- Apply the filter to a full-bleed rect. The filter output controls opacity. -->
  <rect x="0" y="0" width="100%" height="100%" fill="#000000" filter="url(#grainFilter)" />
</svg>
