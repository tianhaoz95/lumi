name: lumi
description: "Lumi app (placeholder)"
publish_to: 'none'
version: 0.1.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_rust_bridge: ^2.10.0  # temporarily pin to older version to allow CI Flutter SDK compatibility
  go_router: ^7.0.0
  appwrite: ^21.0.0
  flutter_riverpod: ^2.0.0
  google_fonts: ^3.0.1
  material_symbols_icons: ^4.2928.1
  flutter_svg: ^1.1.1
  path_provider: ^2.1.0
  image_picker: ^0.8.7+4
  camera: ^0.10.0+3
  workmanager: ^0.4.1
  background_fetch: ^1.0.0
  flutter_background_geolocation: ^4.8.0
  battery_plus: ^3.0.4
  flutter_local_notifications: ^18.0.1
  receive_sharing_intent: ^1.4.5

flutter:
  uses-material-design: true
  assets:
    - design/assets/grain.svg
  # Generated FRB bindings will live under lib/shared/bridge/

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.21.0
  integration_test:
    sdk: flutter
